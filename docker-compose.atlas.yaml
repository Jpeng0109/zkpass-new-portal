# Production stack using MongoDB Atlas (no local Mongo container)
# Usage:
#   1. Copy .env.production.example → .env.production and fill values
#   2. docker compose -f docker-compose.atlas.yaml --env-file .env.production up -d --build
#   3. docker compose -f docker-compose.atlas.yaml --env-file .env.production --profile seed run --rm seed

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 5000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles: ["seed"]
    env_file:
      - .env.production
    command: ["node", "src/scripts/seed.js"]
    restart: "no"
